<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futsal Booking</title>
    <link rel="stylesheet" href="userindex.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
   
</head>
<body>
    <script src="userindex.js" defer></script>
    <!-- New top bar for email and location -->
   <!-- Top bar inside header-container -->
   <div class="top-bar">
    <div>Email: example@example.com</div>
    <div>Location: Kathmandu, Nayabazar</div>
</div>

    <!-- Header container with logo, navbar, and form -->
    <div class="header-container">
        
    
         <!-- Logo -->
    <div class="logo">
        <!-- <img src="img/futsal.png" alt="Logo" class="logo-image"> -->
         <h1>logo</h1>
    </div>

    <!-- Navbar -->
    <div id="navbar">
        <ul>
            <li><i class="fas fa-home"></i> <a href="userindex.html">Home</a></li>
            <li><i class="fas fa-futbol"></i> <a href="futsal.html">Futsal</a></li>
            <li><i class="fas fa-phone-alt"></i><a href="contact.html"> Contact</a></li>
            <li><i class="fas fa-info-circle"></i> <a href="#" id="aboutus.html">About</a></li>
        </ul>
    </div>

    <!-- Form (Register/Login) -->
    <div id="form">
        <ul>
            <li>Register</li>
            <li>Login</li>
        </ul>
    </div>
</div>
    
<!-- Main Content Sections -->
<div id="home-section">
    <!-- Search bar positioned below the navbar -->
    <div id="search-bar-container">
        <input type="text" id="search-bar" placeholder="Search...">
    </div>

    <div class="image-container">
        <img src="img/football.jpg" alt="Football" class="fit-image">
        <div class="text-overlay">
            <h1>Find Your Ground</h1>
            <p>Reserve futsal grounds in your area with our platform.<br>Secure payments, real-time availability, and instant confirmations.</p>
            <button class="book-now-button">Book Now</button>
        </div>
    </div>
    </div>

 <!-- Placeholder for About Section -->
 <div id="about-section" style="display: none;"></div>



   
 <!-- Image Slider -->
<div class="slider">
    <div class="slider-container">
        <img src="img/BhaktapurRoyalNepal.png" alt="Slide 1">
        <img src="img/FutsalVillage.png" alt="Slide 2">
        <img src="img/BhaktapurRoyalNepal.png" alt="Slide 1">
    </div>
    <button class="slider-btn prev">&#10094;</button> <!-- Left arrow button -->
    <button class="slider-btn next">&#10095;</button> <!-- Right arrow button -->
</div>

<script>
    
    document.addEventListener('DOMContentLoaded', function () {
            const homeSection = document.getElementById('home-section');
            const aboutSection = document.getElementById('about-section');
            const aboutLink = document.getElementById('aboutus.html');
            const homeLink = document.getElementById('home-link');

            // Function to load the About Us page dynamically
            aboutLink.addEventListener('click', function (e) {
                e.preventDefault();
                fetch('aboutus.html')
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Network response was not ok');
                        }
                        return response.text();
                    })
                    .then(html => {
                        aboutSection.innerHTML = html;
                        aboutSection.style.display = 'block';
                        homeSection.style.display = 'none';
                    })
                    .catch(error => {
                        console.error('Error fetching aboutus.html:', error);
                    });
            });

            // Back to Home
            homeLink.addEventListener('click', function (e) {
                e.preventDefault();
                aboutSection.style.display = 'none';
                homeSection.style.display = 'block';
            });
        });
</script>

</body>
</html>
