 <!-- Image Slider -->
 <div class="slider">
    <div class="slider-container">
        <img src="img/BhaktapurRoyalNepal.png" alt="Slide 1">
        <img src="img/FutsalVillage.png" alt="Slide 2">
        <img src="img/BhaktapurRoyalNepal.png" alt="Slide 1">
        <img src="img/FutsalVillage.png" alt="Slide 3">
        <img src="img/BhaktapurRoyalNepal.png" alt="Slide 1">
        <img src="img/FutsalVillage.png" alt="Slide 3">
    </div>
    <button class="slider-btn prev" onclick="prevSlide()">&#10094;</button>
    <button class="slider-btn next" onclick="nextSlide()">&#10095;</button>
</div>
    <script>
        let currentSlide = 0;

        function showSlide(index) {
            const sliderContainer = document.querySelector('.slider-container');
            const slides = document.querySelectorAll('.slider-container img');
            const totalSlides = slides.length;

            currentSlide = (index + totalSlides) % totalSlides; // Loop through slides
            sliderContainer.style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        function nextSlide() {
            showSlide(currentSlide + 1);
        }

        function prevSlide() {
            showSlide(currentSlide - 1);
        }
    </script>
